<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* DRUIDS-inspired dark palette with cooler undertone for pixel art */
            --bg: #16161a;
            --bg-secondary: #1e1e23;
            --bg-card: #1e1e23;
            --bg-card-hover: #26262c;
            --bg-elevated: #26262c;
            --border: #333339;
            --border-bright: #44444d;

            /* Opacity-based text hierarchy */
            --text: rgba(255, 255, 255, 0.82);
            --text-dim: rgba(255, 255, 255, 0.52);
            --text-muted: rgba(255, 255, 255, 0.32);
            --text-disabled: rgba(255, 255, 255, 0.20);

            /* Semantic colours */
            --green: #41c464;
            --green-subtle: rgba(65, 196, 100, 0.12);
            --purple: #7b61ff;
            --purple-subtle: rgba(123, 97, 255, 0.10);
            --blue: #3d8bd0;
            --orange: #f99d02;
            --red: #eb364b;
            --pink: #d671d0;

            /* Typography */
            --pixel-font: 'Press Start 2P', monospace;
            --mono: 'SF Mono', Monaco, Menlo, Consolas, monospace;
            --ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

            /* Spacing (DRUIDS scale) */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
        }

        body {
            font-family: var(--ui);
            font-size: 14px;
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- TOP BAR ---- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-lg);
            height: 48px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        .topbar-left { display: flex; align-items: center; gap: var(--space-md); }
        .logo {
            font-family: var(--pixel-font);
            font-size: 9px;
            color: var(--purple);
            letter-spacing: 1px;
        }
        .topbar-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
        .live-dot {
            width: 6px; height: 6px; background: var(--green); border-radius: 50%;
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(65, 196, 100, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(65, 196, 100, 0); }
        }
        .topbar-right { display: flex; align-items: center; gap: var(--space-sm); }
        .nav-btn {
            font-size: 12px; font-weight: 500; color: var(--text-dim); text-decoration: none;
            padding: 5px 12px; border: 1px solid var(--border); border-radius: 4px;
            transition: all .15s; font-family: var(--ui);
        }
        .nav-btn:hover { color: var(--text); border-color: var(--border-bright); background: var(--bg-card-hover); }

        /* ---- HERO / METRICS BAR ---- */
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-xl);
            padding: var(--space-lg) var(--space-lg) var(--space-md);
        }
        .hero-metric { text-align: center; }
        .hero-number {
            font-family: var(--ui);
            font-weight: 600;
            font-size: 48px;
            color: var(--text);
            line-height: 1;
            letter-spacing: -1px;
        }
        .hero-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .hero-stats { display: flex; gap: var(--space-lg); }
        .hero-stat { text-align: center; }
        .hero-stat-val {
            font-family: var(--ui);
            font-weight: 600;
            font-size: 22px;
            color: var(--text-dim);
        }
        .hero-stat-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ---- ROOMS GRID ---- */
        .rooms-container { padding: 0 var(--space-lg) var(--space-lg); }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: var(--space-md);
        }

        /* ---- ROOM ---- */
        .room {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .room-header {
            padding: var(--space-sm) 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-count { color: var(--text-muted); font-weight: 400; font-size: 12px; }
        .room-body {
            display: flex;
            min-height: 120px;
            position: relative;
        }

        /* Office side */
        .room-office {
            flex: 1;
            padding: var(--space-sm) 10px;
            border-right: 1px solid var(--border);
            position: relative;
        }
        .room-office-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--space-sm);
        }

        /* Bedroom side */
        .room-bedroom {
            flex: 1;
            padding: var(--space-sm) 10px;
            position: relative;
        }
        .room-bedroom-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--space-sm);
        }

        /* ---- AGENT SLOT (shared) ---- */
        .agent-slot {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: 4px;
            min-height: 42px;
            cursor: pointer;
            border-radius: 4px;
            padding: var(--space-xs) 6px;
            transition: background .12s ease;
            position: relative;
        }
        .agent-slot:hover { background: var(--bg-card-hover); }
        .agent-slot.selected { background: var(--purple-subtle); }

        .agent-sprite { width: 32px; height: 32px; flex-shrink: 0; image-rendering: pixelated; }

        /* Walking agent overlay */
        .agent-walking {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
        .agent-walking canvas { image-rendering: pixelated; }

        /* Agent info */
        .agent-info { flex: 1; min-width: 0; overflow: hidden; }
        .agent-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .agent-name .name-colour {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 2px;
            margin-right: 6px;
            vertical-align: middle;
        }
        .agent-topic {
            font-size: 11px;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
            margin-top: 1px;
        }
        .agent-idle-since {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        /* Desk scene */
        .desk-scene {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            flex-shrink: 0;
        }
        .desk-monitor {
            width: 28px; height: 20px;
            background: var(--bg);
            border: 2px solid var(--border-bright);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .desk-monitor-screen {
            position: absolute;
            inset: 2px;
            background: #111114;
            overflow: hidden;
        }
        .desk-monitor-line {
            height: 2px;
            margin: 1px 2px;
            border-radius: 1px;
            background: var(--green);
            opacity: 0.6;
        }

        /* Typing animation on monitor */
        @keyframes typing {
            0% { width: 0; }
            50% { width: 80%; }
            100% { width: 0; }
        }
        .agent-slot.working .desk-monitor-line {
            animation: typing 1.5s steps(6) infinite;
        }
        .agent-slot.working .desk-monitor-line:nth-child(2) { animation-delay: 0.3s; }
        .agent-slot.working .desk-monitor-line:nth-child(3) { animation-delay: 0.6s; }

        /* Bed scene */
        .bed-scene {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .bed-frame {
            width: 36px; height: 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            position: relative;
        }
        .bed-pillow {
            position: absolute;
            left: 2px; top: 2px;
            width: 8px; height: 14px;
            background: var(--bg-elevated);
            border-radius: 2px;
        }
        .bed-blanket {
            position: absolute;
            right: 2px; top: 3px;
            width: 22px; height: 12px;
            border-radius: 2px;
            opacity: 0.5;
        }
        .bed-zzz {
            font-family: var(--pixel-font);
            font-size: 6px;
            color: var(--text-muted);
            animation: zzz 2.5s ease-in-out infinite;
        }
        @keyframes zzz {
            0%,100% { opacity: .2; transform: translateY(0); }
            50% { opacity: .6; transform: translateY(-3px); }
        }

        /* ---- SIDE PANEL ---- */
        .side-panel {
            position: fixed;
            top: 0; right: 0;
            width: 400px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.2s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .side-panel.open { transform: translateX(0); }
        .side-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px var(--space-md);
            border-bottom: 1px solid var(--border);
            height: 48px;
        }
        .side-panel-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .side-panel-close {
            background: none; border: 1px solid var(--border); border-radius: 4px;
            color: var(--text-dim); cursor: pointer; padding: 4px 10px; font-size: 12px;
            font-family: var(--ui); font-weight: 500;
            transition: all .12s ease;
        }
        .side-panel-close:hover { color: var(--text); border-color: var(--border-bright); background: var(--bg-card-hover); }
        .side-panel-body { flex: 1; overflow-y: auto; padding: var(--space-md); }
        .side-panel-body::-webkit-scrollbar { width: 4px; }
        .side-panel-body::-webkit-scrollbar-track { background: transparent; }
        .side-panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .side-panel-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 99; display: none;
        }
        .side-panel-overlay.open { display: block; }

        /* Detail panel - agent header */
        .sd-agent-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: var(--space-md);
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .sd-agent-header canvas { image-rendering: pixelated; }
        .sd-agent-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .sd-agent-status {
            font-size: 12px;
            margin-top: 2px;
        }

        .sd-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 12px;
        }
        .sd-row:last-child { border-bottom: none; }
        .sd-key { color: var(--text-dim); flex-shrink: 0; font-weight: 500; }
        .sd-val { color: var(--text); font-family: var(--mono); font-size: 11px; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sd-status-active { color: var(--green); }
        .sd-status-idle { color: var(--text-muted); }
        .sd-summary {
            margin-top: 12px;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-dim);
            font-style: italic;
            word-break: break-word;
            line-height: 1.5;
        }

        /* ---- LAUNCH BUTTON ---- */
        .sd-launch-btn {
            display: block;
            width: 100%;
            margin-top: var(--space-md);
            padding: 8px 0;
            background: var(--purple);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: var(--ui);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .12s ease;
        }
        .sd-launch-btn:hover { opacity: 0.85; }
        .sd-launch-btn:disabled { opacity: 0.5; cursor: default; }
        .sd-superset-btn { background: var(--blue); }
        .sd-btn-row { display: flex; gap: var(--space-sm); margin-top: var(--space-md); }
        .sd-btn-row .sd-launch-btn { flex: 1; margin-top: 0; }

        /* ---- DETAIL PANEL SECTIONS ---- */
        .sd-section {
            margin-top: var(--space-md);
            padding-top: var(--space-md);
            border-top: 1px solid var(--border);
        }
        .sd-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--space-sm);
        }
        .sd-recap {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.5;
            word-break: break-word;
            padding: var(--space-sm) 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .sd-messages {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
        }
        .sd-messages::-webkit-scrollbar { width: 4px; }
        .sd-messages::-webkit-scrollbar-track { background: transparent; }
        .sd-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .sd-message {
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .sd-message-text {
            font-size: 12px;
            color: var(--text);
            line-height: 1.4;
            word-break: break-word;
        }
        .sd-message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ---- LIGHT MODE ---- */
        body.light-mode {
            --bg: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f0f2;
            --bg-elevated: #f0f0f2;
            --border: #e2e2e8;
            --border-bright: #c8c8d0;

            --text: rgba(28, 43, 52, 0.92);
            --text-dim: rgba(28, 43, 52, 0.58);
            --text-muted: rgba(28, 43, 52, 0.38);
            --text-disabled: rgba(28, 43, 52, 0.22);

            --green: #2a7e41;
            --green-subtle: rgba(42, 126, 65, 0.08);
            --purple: #5533cc;
            --purple-subtle: rgba(85, 51, 204, 0.06);
            --blue: #0953bf;
            --orange: #c15800;
            --red: #bc2b3c;
            --pink: #a0429a;
        }

        body.light-mode .sd-row {
            border-bottom-color: rgba(28, 43, 52, 0.08);
        }

        body.light-mode .agent-sprite {
            background: #2a2a30;
            border-radius: 4px;
            padding: 2px;
            width: 36px;
            height: 36px;
        }

        body.light-mode .desk-monitor {
            background: #e8e8ec;
        }
        body.light-mode .desk-monitor-screen {
            background: #1a1a1f;
        }

        /* Theme toggle */
        .theme-toggle {
            background: none; border: 1px solid var(--border); border-radius: 4px;
            color: var(--text-dim); cursor: pointer; padding: 5px 10px; font-size: 14px;
            font-family: var(--ui); line-height: 1;
            transition: all .12s ease;
        }
        .theme-toggle:hover { color: var(--text); border-color: var(--border-bright); background: var(--bg-card-hover); }

        @media (max-width: 768px) {
            .hero { flex-direction: column; gap: 16px; }
            .hero-number { font-size: 36px; }
            .rooms-grid { grid-template-columns: 1fr; }
            .side-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <span class="logo">AGENTS</span>
            <div class="topbar-status">
                <span class="live-dot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
        <div class="topbar-right">
            <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">&#9789;</button>
            <a href="/index.html" class="nav-btn">Activity Dashboard</a>
        </div>
    </div>

    <div class="hero">
        <div class="hero-metric">
            <div class="hero-number" id="heroCount">0</div>
            <div class="hero-label">Agents Online</div>
        </div>
        <div class="hero-stats">
            <div class="hero-stat">
                <div class="hero-stat-val" id="heroActive">0</div>
                <div class="hero-stat-label">Working</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-val" id="heroIdle">0</div>
                <div class="hero-stat-label">Sleeping</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-val" id="heroProjects">0</div>
                <div class="hero-stat-label">Projects</div>
            </div>
        </div>
    </div>

    <div class="rooms-container">
        <div class="rooms-grid" id="roomsGrid"></div>
    </div>

    <div class="side-panel-overlay" id="sidePanelOverlay"></div>
    <div class="side-panel" id="sidePanel">
        <div class="side-panel-header">
            <span class="side-panel-title">Agent Detail</span>
            <button class="side-panel-close" id="sidePanelClose">Close</button>
        </div>
        <div class="side-panel-body" id="agentDetailPanel"></div>
    </div>

    <script>
    (function() {
        'use strict';

        // ---- THEME TOGGLE ----
        (function initTheme() {
            var saved = localStorage.getItem('agent-dashboard-theme');
            var btn = document.getElementById('themeToggle');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                btn.innerHTML = '&#9788;';
            }
            btn.addEventListener('click', function() {
                var isLight = document.body.classList.toggle('light-mode');
                localStorage.setItem('agent-dashboard-theme', isLight ? 'light' : 'dark');
                btn.innerHTML = isLight ? '&#9788;' : '&#9789;';
            });
        })();

        var POLL_INTERVAL = 5000;
        var selectedId = null;

        // Track previous state for walk transitions
        var prevActiveState = {}; // id -> boolean (was active last poll)
        // Track walking agents for animation
        var walkingAgents = {}; // id -> { roomEl, startSide, progress, frameIndex, peer }

        // ---- HELPERS ----
        function isActive(peer) { return !!peer.isActive; }
        function extractProject(cwd) {
            var m = cwd.match(/\/proj\/(.+)$/);
            return m ? m[1] : cwd.split('/').slice(-2).join('/');
        }
        function shortProject(cwd) { return extractProject(cwd).split('/').pop(); }
        function isWorktree(cwd) { return cwd.indexOf('/worktrees/') !== -1; }
        function extractBranch(cwd) { return isWorktree(cwd) ? cwd.split('/').pop() : 'main'; }
        function formatUptime(ts) {
            var ms = Date.now() - new Date(ts).getTime();
            var m = Math.floor(ms / 60000);
            if (m < 60) return m + 'm';
            var h = Math.floor(m / 60);
            if (h < 24) return h + 'h ' + (m % 60) + 'm';
            return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
        }
        function getSessionName(peer) {
            if (peer.supersetTabName) {
                var name = peer.supersetTabName.replace(/^[\u2800-\u28FF\u2733\s]+/, '').trim();
                if (name && name !== 'Claude Code' && name.length > 2) return name;
            }
            return peer.sessionTopic || null;
        }
        function formatTimeSince(ts) {
            if (!ts) return null;
            var ms = Date.now() - new Date(ts).getTime();
            if (ms < 0) return 'just now';
            var s = Math.floor(ms / 1000);
            if (s < 60) return s + 's ago';
            var m = Math.floor(s / 60);
            if (m < 60) return m + 'm ago';
            var h = Math.floor(m / 60);
            if (h < 24) return h + 'h ' + (m % 60) + 'm ago';
            return Math.floor(h / 24) + 'd ago';
        }
        function formatIdleDuration(ts, fallback) {
            var t = ts || fallback;
            if (!t) return 'never worked';
            var ms = Date.now() - new Date(t).getTime();
            if (ms < 0) return 'just now';
            var s = Math.floor(ms / 1000);
            if (s < 60) return 'idle ' + s + 's';
            var m = Math.floor(s / 60);
            if (m < 60) return 'idle ' + m + 'm';
            var h = Math.floor(m / 60);
            if (h < 24) return 'idle ' + h + 'h ' + (m % 60) + 'm';
            return 'idle ' + Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
        }
        var SESSION_COLOR_MAP = {
            yellow: ['#f5c542', '#c9a030'],
            green:  ['#41c464', '#2a7e41'],
            blue:   ['#4da6ff', '#3377cc'],
            purple: ['#9b7bff', '#6b4fd4'],
            red:    ['#ff5555', '#cc3333'],
            orange: ['#f99d02', '#c17800'],
            pink:   ['#ff79c6', '#cc5599'],
            cyan:   ['#8be9fd', '#55bbcc'],
        };
        var SESSION_COLOR_NAMES = Object.keys(SESSION_COLOR_MAP);
        function hashStr(s) {
            var h = 0;
            for (var i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
            return Math.abs(h);
        }
        function getColors(peer) {
            // Prefer session colour from status line
            if (peer.sessionColor && SESSION_COLOR_MAP[peer.sessionColor]) {
                return SESSION_COLOR_MAP[peer.sessionColor];
            }
            // Deterministic colour from agent ID
            var colorName = SESSION_COLOR_NAMES[hashStr(peer.id) % SESSION_COLOR_NAMES.length];
            return SESSION_COLOR_MAP[colorName];
        }
        function getAgentName(peer) {
            return peer.agentName || peer.id.slice(0, 8);
        }
        function el(tag, cls, txt) {
            var n = document.createElement(tag);
            if (cls) n.className = cls;
            if (txt) n.textContent = txt;
            return n;
        }

        // ---- PIXEL ART SPRITE DRAWING ----
        // Draw a more detailed pixel character (front-facing, 32x32 canvas)
        function drawCharacter(canvas, color, state) {
            var ctx = canvas.getContext('2d');
            var p = 2; // pixel size
            ctx.clearRect(0, 0, 32, 32);
            ctx.imageSmoothingEnabled = false;

            var isTyping = (state === 'type');
            var isSleeping = (state === 'sleep');
            var isWalking = (state === 'walk');

            // Hair
            ctx.fillStyle = darkenColor(color, 0.4);
            ctx.fillRect(5*p, 0*p, 6*p, 2*p);
            ctx.fillRect(4*p, 1*p, 1*p, 1*p);
            ctx.fillRect(11*p, 1*p, 1*p, 1*p);

            // Head (skin)
            ctx.fillStyle = '#ffd5b0';
            ctx.fillRect(5*p, 2*p, 6*p, 5*p);
            // Ears
            ctx.fillRect(4*p, 3*p, 1*p, 2*p);
            ctx.fillRect(11*p, 3*p, 1*p, 2*p);

            // Eyes
            if (isSleeping) {
                // Closed eyes (horizontal lines)
                ctx.fillStyle = '#555';
                ctx.fillRect(6*p, 4*p, 2*p, 1*p);
                ctx.fillRect(9*p, 4*p, 2*p, 1*p);
            } else {
                ctx.fillStyle = '#222';
                ctx.fillRect(6*p, 3.5*p, 1.5*p, 1.5*p);
                ctx.fillRect(9*p, 3.5*p, 1.5*p, 1.5*p);
                // Eye highlights
                ctx.fillStyle = '#fff';
                ctx.fillRect(6.5*p, 3.5*p, 0.5*p, 0.5*p);
                ctx.fillRect(9.5*p, 3.5*p, 0.5*p, 0.5*p);
            }

            // Mouth
            if (!isSleeping) {
                ctx.fillStyle = '#c4937a';
                ctx.fillRect(7.5*p, 5.5*p, 1*p, 0.5*p);
            }

            // Body (shirt)
            ctx.fillStyle = color;
            ctx.fillRect(4*p, 7*p, 8*p, 5*p);

            // Arms
            if (isTyping) {
                // Arms forward (typing)
                ctx.fillStyle = color;
                ctx.fillRect(2*p, 7*p, 2*p, 3*p);
                ctx.fillRect(12*p, 7*p, 2*p, 3*p);
                // Hands (skin) reaching forward
                ctx.fillStyle = '#ffd5b0';
                ctx.fillRect(2*p, 10*p, 2*p, 1*p);
                ctx.fillRect(12*p, 10*p, 2*p, 1*p);
            } else if (isWalking) {
                // One arm forward, one back
                ctx.fillStyle = color;
                ctx.fillRect(2*p, 7*p, 2*p, 4*p);
                ctx.fillRect(12*p, 8*p, 2*p, 3*p);
                ctx.fillStyle = '#ffd5b0';
                ctx.fillRect(2*p, 11*p, 2*p, 1*p);
                ctx.fillRect(12*p, 11*p, 2*p, 1*p);
            } else {
                // Arms at sides
                ctx.fillStyle = color;
                ctx.fillRect(2*p, 7*p, 2*p, 4*p);
                ctx.fillRect(12*p, 7*p, 2*p, 4*p);
                // Hands
                ctx.fillStyle = '#ffd5b0';
                ctx.fillRect(2*p, 11*p, 2*p, 1*p);
                ctx.fillRect(12*p, 11*p, 2*p, 1*p);
            }

            // Legs (dark)
            ctx.fillStyle = darkenColor(color, 0.5);
            if (isWalking) {
                // Walking legs - spread apart
                ctx.fillRect(5*p, 12*p, 2*p, 3*p);
                ctx.fillRect(9*p, 12*p, 2*p, 3*p);
                // Shoes
                ctx.fillStyle = '#333';
                ctx.fillRect(4*p, 15*p, 3*p, 1*p);
                ctx.fillRect(9*p, 15*p, 3*p, 1*p);
            } else {
                ctx.fillRect(5*p, 12*p, 3*p, 3*p);
                ctx.fillRect(8*p, 12*p, 3*p, 3*p);
                // Shoes
                ctx.fillStyle = '#333';
                ctx.fillRect(4*p, 15*p, 4*p, 1*p);
                ctx.fillRect(8*p, 15*p, 4*p, 1*p);
            }

            // Sleeping overlay
            if (isSleeping) {
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 32, 32);
                ctx.globalAlpha = 1;
            }
        }

        // Walk frame alternation (for animation)
        function drawCharacterWalkFrame(canvas, color, frame) {
            var ctx = canvas.getContext('2d');
            var p = 2;
            ctx.clearRect(0, 0, 32, 32);
            ctx.imageSmoothingEnabled = false;

            // Hair
            ctx.fillStyle = darkenColor(color, 0.4);
            ctx.fillRect(5*p, 0*p, 6*p, 2*p);
            ctx.fillRect(4*p, 1*p, 1*p, 1*p);
            ctx.fillRect(11*p, 1*p, 1*p, 1*p);

            // Head
            ctx.fillStyle = '#ffd5b0';
            ctx.fillRect(5*p, 2*p, 6*p, 5*p);
            ctx.fillRect(4*p, 3*p, 1*p, 2*p);
            ctx.fillRect(11*p, 3*p, 1*p, 2*p);

            // Eyes
            ctx.fillStyle = '#222';
            ctx.fillRect(6*p, 3.5*p, 1.5*p, 1.5*p);
            ctx.fillRect(9*p, 3.5*p, 1.5*p, 1.5*p);
            ctx.fillStyle = '#fff';
            ctx.fillRect(6.5*p, 3.5*p, 0.5*p, 0.5*p);
            ctx.fillRect(9.5*p, 3.5*p, 0.5*p, 0.5*p);

            // Mouth
            ctx.fillStyle = '#c4937a';
            ctx.fillRect(7.5*p, 5.5*p, 1*p, 0.5*p);

            // Body
            ctx.fillStyle = color;
            // Slight bob
            var bobY = (frame % 2 === 0) ? 0 : -0.5*p;
            ctx.fillRect(4*p, 7*p + bobY, 8*p, 5*p);

            // Arms - swing based on frame
            ctx.fillStyle = color;
            if (frame % 4 < 2) {
                ctx.fillRect(2*p, 7*p + bobY, 2*p, 4*p);
                ctx.fillRect(12*p, 8*p + bobY, 2*p, 3*p);
            } else {
                ctx.fillRect(2*p, 8*p + bobY, 2*p, 3*p);
                ctx.fillRect(12*p, 7*p + bobY, 2*p, 4*p);
            }
            // Hands
            ctx.fillStyle = '#ffd5b0';
            if (frame % 4 < 2) {
                ctx.fillRect(2*p, 11*p + bobY, 2*p, 1*p);
                ctx.fillRect(12*p, 11*p + bobY, 2*p, 1*p);
            } else {
                ctx.fillRect(2*p, 11*p + bobY, 2*p, 1*p);
                ctx.fillRect(12*p, 11*p + bobY, 2*p, 1*p);
            }

            // Legs - alternate
            ctx.fillStyle = darkenColor(color, 0.5);
            if (frame % 4 < 2) {
                ctx.fillRect(5*p, 12*p + bobY, 2*p, 3*p);
                ctx.fillRect(9*p, 12.5*p + bobY, 2*p, 2.5*p);
            } else {
                ctx.fillRect(5*p, 12.5*p + bobY, 2*p, 2.5*p);
                ctx.fillRect(9*p, 12*p + bobY, 2*p, 3*p);
            }
            // Shoes
            ctx.fillStyle = '#333';
            if (frame % 4 < 2) {
                ctx.fillRect(4*p, 15*p + bobY, 3*p, 1*p);
                ctx.fillRect(9*p, 14.5*p + bobY, 3*p, 1*p);
            } else {
                ctx.fillRect(4*p, 14.5*p + bobY, 3*p, 1*p);
                ctx.fillRect(9*p, 15*p + bobY, 3*p, 1*p);
            }
        }

        function darkenColor(hex, amount) {
            var r = parseInt(hex.slice(1,3), 16);
            var g = parseInt(hex.slice(3,5), 16);
            var b = parseInt(hex.slice(5,7), 16);
            r = Math.round(r * (1 - amount));
            g = Math.round(g * (1 - amount));
            b = Math.round(b * (1 - amount));
            return '#' + ((1<<24) + (r<<16) + (g<<8) + b).toString(16).slice(1);
        }

        // ---- BUILD ROOM ----
        function buildRoom(projectKey, agents) {
            var room = el('div', 'room');
            room.id = 'room-' + projectKey.replace(/\//g, '-');

            var activeAgents = [];
            var idleAgents = [];
            var walkingIds = {};
            for (var i = 0; i < agents.length; i++) {
                // Skip agents that are currently walking (animated between sides)
                if (walkingAgents[agents[i].id]) {
                    walkingIds[agents[i].id] = true;
                    continue;
                }
                if (isActive(agents[i])) activeAgents.push(agents[i]);
                else idleAgents.push(agents[i]);
            }

            // Header
            var header = el('div', 'room-header');
            header.appendChild(el('span', '', shortProject(agents[0].cwd)));
            header.appendChild(el('span', 'room-count', agents.length + ' agent' + (agents.length !== 1 ? 's' : '')));
            room.appendChild(header);

            // Body: office + bedroom
            var body = el('div', 'room-body');
            body.setAttribute('data-project', projectKey);

            // Office side
            var office = el('div', 'room-office');
            office.appendChild(el('div', 'room-office-label', 'office'));
            for (var a = 0; a < activeAgents.length; a++) {
                office.appendChild(buildDeskSlot(activeAgents[a]));
            }
            if (activeAgents.length === 0 && Object.keys(walkingIds).length === 0) {
                var emptyOffice = el('div', '', 'empty');
                emptyOffice.style.cssText = 'font-size:8px;color:var(--text-muted);padding:8px 0;font-family:var(--pixel-font);';
                office.appendChild(emptyOffice);
            }
            body.appendChild(office);

            // Bedroom side
            var bedroom = el('div', 'room-bedroom');
            bedroom.appendChild(el('div', 'room-bedroom-label', 'bedroom'));
            for (var b = 0; b < idleAgents.length; b++) {
                bedroom.appendChild(buildBedSlot(idleAgents[b]));
            }
            if (idleAgents.length === 0 && Object.keys(walkingIds).length === 0) {
                var emptyBed = el('div', '', 'empty');
                emptyBed.style.cssText = 'font-size:8px;color:var(--text-muted);padding:8px 0;font-family:var(--pixel-font);';
                bedroom.appendChild(emptyBed);
            }
            body.appendChild(bedroom);

            room.appendChild(body);
            return room;
        }

        // ---- DESK SLOT (working agent) ----
        function buildDeskSlot(peer) {
            var colors = getColors(peer);
            var slot = el('div', 'agent-slot working');
            if (peer.id === selectedId) slot.classList.add('selected');
            slot.setAttribute('data-agent-id', peer.id);

            slot.addEventListener('click', function() { selectAgent(peer.id, peer); });

            // Desk scene: sprite + monitor
            var scene = el('div', 'desk-scene');

            var canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            canvas.className = 'agent-sprite';
            drawCharacter(canvas, colors[0], 'type');
            scene.appendChild(canvas);

            var monitor = el('div', 'desk-monitor');
            var screen = el('div', 'desk-monitor-screen');
            screen.appendChild(el('div', 'desk-monitor-line'));
            screen.appendChild(el('div', 'desk-monitor-line'));
            screen.appendChild(el('div', 'desk-monitor-line'));
            monitor.appendChild(screen);
            scene.appendChild(monitor);

            slot.appendChild(scene);

            // Name + topic
            var info = el('div', 'agent-info');
            var nameEl = el('div', 'agent-name');
            var dot = el('span', 'name-colour');
            dot.style.background = colors[0];
            nameEl.appendChild(dot);
            nameEl.appendChild(document.createTextNode(getAgentName(peer)));
            info.appendChild(nameEl);

            var sessionName = getSessionName(peer);
            if (sessionName) {
                var topic = el('div', 'agent-topic', sessionName);
                topic.title = sessionName;
                info.appendChild(topic);
            }
            slot.appendChild(info);

            return slot;
        }

        // ---- BED SLOT (sleeping agent) ----
        function buildBedSlot(peer) {
            var colors = getColors(peer);
            var slot = el('div', 'agent-slot');
            if (peer.id === selectedId) slot.classList.add('selected');
            slot.setAttribute('data-agent-id', peer.id);

            slot.addEventListener('click', function() { selectAgent(peer.id, peer); });

            // Bed scene: sprite + bed + zzz
            var scene = el('div', 'bed-scene');

            var canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            canvas.className = 'agent-sprite';
            drawCharacter(canvas, colors[0], 'sleep');
            scene.appendChild(canvas);

            var bed = el('div', 'bed-frame');
            bed.appendChild(el('div', 'bed-pillow'));
            var blanket = el('div', 'bed-blanket');
            blanket.style.background = colors[0];
            bed.appendChild(blanket);
            scene.appendChild(bed);

            scene.appendChild(el('span', 'bed-zzz', 'zzz'));

            slot.appendChild(scene);

            // Name + topic + idle time
            var info = el('div', 'agent-info');
            var nameEl = el('div', 'agent-name');
            var dot = el('span', 'name-colour');
            dot.style.background = colors[0];
            nameEl.appendChild(dot);
            nameEl.appendChild(document.createTextNode(getAgentName(peer)));
            info.appendChild(nameEl);

            var sessionName = getSessionName(peer);
            if (sessionName) {
                var topic = el('div', 'agent-topic', sessionName);
                topic.title = sessionName;
                info.appendChild(topic);
            }

            // Idle since
            var idleText = formatIdleDuration(peer.lastActiveAt, peer.lastInstructionAt);
            info.appendChild(el('div', 'agent-idle-since', idleText));

            slot.appendChild(info);

            return slot;
        }

        // ---- WALKING ANIMATION ----
        var walkAnimFrame = 0;
        var walkAnimTimer = null;

        function startWalkAnimation(peerId, peer, direction) {
            // direction: 'to-office' (bedroom -> office) or 'to-bed' (office -> bedroom)
            walkingAgents[peerId] = {
                direction: direction,
                progress: 0,
                frameIndex: 0,
                peer: peer,
            };

            if (!walkAnimTimer) {
                walkAnimTimer = setInterval(tickWalkAnimations, 50);
            }
        }

        function tickWalkAnimations() {
            var activeWalks = Object.keys(walkingAgents);
            if (activeWalks.length === 0) {
                clearInterval(walkAnimTimer);
                walkAnimTimer = null;
                return;
            }

            for (var i = 0; i < activeWalks.length; i++) {
                var id = activeWalks[i];
                var walk = walkingAgents[id];
                walk.progress += 0.05; // ~1s total walk
                walk.frameIndex++;

                if (walk.progress >= 1) {
                    delete walkingAgents[id];
                    // Re-render rooms to show agent in new position
                    if (lastPeers) renderRooms(lastPeers);
                } else {
                    // Update the walking overlay element
                    var overlay = document.querySelector('.agent-walking[data-walk-id="' + id + '"]');
                    if (overlay) {
                        var body = overlay.parentElement;
                        var bodyRect = body.getBoundingClientRect();
                        var halfW = bodyRect.width / 2;
                        var startX, endX;
                        if (walk.direction === 'to-office') {
                            startX = halfW + 20;
                            endX = 20;
                        } else {
                            startX = 20;
                            endX = halfW + 20;
                        }
                        var currentX = startX + (endX - startX) * easeInOut(walk.progress);
                        var currentY = 30 + Math.sin(walk.progress * Math.PI) * -8;
                        overlay.style.left = currentX + 'px';
                        overlay.style.top = currentY + 'px';

                        // Update sprite frame
                        var canvas = overlay.querySelector('canvas');
                        if (canvas) {
                            drawCharacterWalkFrame(canvas, getColors(walk.peer)[0], walk.frameIndex);
                        }
                    }
                }
            }
        }

        function easeInOut(t) {
            return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function renderWalkingOverlays() {
            // Remove old overlays
            var old = document.querySelectorAll('.agent-walking');
            for (var i = 0; i < old.length; i++) old[i].remove();

            var ids = Object.keys(walkingAgents);
            for (var j = 0; j < ids.length; j++) {
                var id = ids[j];
                var walk = walkingAgents[id];
                var peer = walk.peer;
                var projectKey = extractProject(peer.cwd);

                // Find the room body for this project
                var roomBodies = document.querySelectorAll('.room-body[data-project="' + projectKey + '"]');
                if (roomBodies.length === 0) continue;
                var body = roomBodies[0];

                var overlay = el('div', 'agent-walking');
                overlay.setAttribute('data-walk-id', id);

                var canvas = document.createElement('canvas');
                canvas.width = 32; canvas.height = 32;
                canvas.style.width = '32px';
                canvas.style.height = '32px';
                drawCharacterWalkFrame(canvas, getColors(peer)[0], walk.frameIndex);
                overlay.appendChild(canvas);

                // Name tag under sprite
                var tag = el('div', '');
                tag.style.cssText = 'font-family:var(--pixel-font);font-size:6px;color:var(--text-dim);text-align:center;white-space:nowrap;';
                tag.textContent = getAgentName(peer);
                overlay.appendChild(tag);

                // Position
                var bodyRect = body.getBoundingClientRect();
                var halfW = bodyRect.width / 2;
                var startX, endX;
                if (walk.direction === 'to-office') {
                    startX = halfW + 20;
                    endX = 20;
                } else {
                    startX = 20;
                    endX = halfW + 20;
                }
                var currentX = startX + (endX - startX) * easeInOut(walk.progress);
                var currentY = 30 + Math.sin(walk.progress * Math.PI) * -8;
                overlay.style.left = currentX + 'px';
                overlay.style.top = currentY + 'px';

                body.appendChild(overlay);
            }
        }

        // ---- SELECTION + SIDE PANEL ----
        var allPeersMap = {};
        var panelEl = document.getElementById('sidePanel');
        var overlayEl = document.getElementById('sidePanelOverlay');

        function openPanel() {
            panelEl.classList.add('open');
            overlayEl.classList.add('open');
        }
        function closePanel() {
            panelEl.classList.remove('open');
            overlayEl.classList.remove('open');
            selectedId = null;
            var allSlots = document.querySelectorAll('.agent-slot');
            for (var i = 0; i < allSlots.length; i++) allSlots[i].classList.remove('selected');
        }

        document.getElementById('sidePanelClose').addEventListener('click', closePanel);
        overlayEl.addEventListener('click', closePanel);
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

        function selectAgent(id, peer) {
            selectedId = id;
            if (!peer && allPeersMap[id]) peer = allPeersMap[id];

            var allSlots = document.querySelectorAll('.agent-slot');
            for (var i = 0; i < allSlots.length; i++) allSlots[i].classList.remove('selected');

            renderDetail(peer);
            openPanel();
            if (lastPeers) renderRooms(lastPeers);
        }

        // ---- RENDER DETAIL ----
        function renderDetail(peer) {
            var panel = document.getElementById('agentDetailPanel');
            panel.textContent = '';
            if (!peer) return;

            var active = isActive(peer);
            var colors = getColors(peer);

            // Agent header with large sprite
            var header = el('div', 'sd-agent-header');
            var bigCanvas = document.createElement('canvas');
            bigCanvas.width = 32; bigCanvas.height = 32;
            bigCanvas.style.width = '48px';
            bigCanvas.style.height = '48px';
            drawCharacter(bigCanvas, colors[0], active ? 'type' : 'sleep');
            header.appendChild(bigCanvas);

            var headerInfo = el('div', '');
            headerInfo.appendChild(el('div', 'sd-agent-name', getAgentName(peer)));
            var statusEl = el('div', 'sd-agent-status');
            statusEl.style.color = active ? 'var(--green)' : 'var(--text-muted)';
            statusEl.textContent = active ? 'Working' : 'Sleeping';
            if (!active && (peer.lastActiveAt || peer.lastInstructionAt)) {
                statusEl.textContent += ' - ' + formatIdleDuration(peer.lastActiveAt, peer.lastInstructionAt);
            }
            headerInfo.appendChild(statusEl);
            header.appendChild(headerInfo);
            panel.appendChild(header);

            var detail = el('div', '');
            var rows = [
                ['Name', getAgentName(peer)],
                ['ID', peer.id],
                ['Status', active ? 'Working' : 'Sleeping'],
                ['Project', extractProject(peer.cwd)],
                ['Branch', extractBranch(peer.cwd)],
                ['TTY', peer.tty || '-'],
                ['Uptime', formatUptime(peer.registered_at)],
                ['Worktree', isWorktree(peer.cwd) ? 'Yes' : 'No'],
                ['Session Name', getSessionName(peer) || '(none)'],
                ['Last Instruction', formatTimeSince(peer.lastInstructionAt) || '(unknown)'],
                ['Last Active', peer.lastActiveAt ? formatTimeSince(peer.lastActiveAt) : 'never'],
                ['Superset Project', peer.supersetProject || '-'],
                ['Workspace Type', peer.supersetType || '-'],
                ['Working Dir', peer.cwd],
                ['Last Seen', new Date(peer.last_seen).toLocaleTimeString()],
            ];
            for (var i = 0; i < rows.length; i++) {
                var row = el('div', 'sd-row');
                row.appendChild(el('span', 'sd-key', rows[i][0]));
                var val = el('span', 'sd-val', rows[i][1]);
                val.title = rows[i][1];
                if (rows[i][0] === 'Status') val.className = 'sd-val ' + (active ? 'sd-status-active' : 'sd-status-idle');
                row.appendChild(val);
                detail.appendChild(row);
            }
            // Launch terminal button
            var launchBtn = el('button', 'sd-launch-btn', 'Open in Ghostty');
            launchBtn.addEventListener('click', function() {
                var body = JSON.stringify({ cwd: peer.cwd, sessionId: peer.sessionId || null });
                launchBtn.textContent = 'Launching...';
                launchBtn.disabled = true;
                fetch('/api/launch-terminal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body })
                    .then(function(r) { return r.json(); })
                    .then(function(d) {
                        launchBtn.textContent = d.ok ? 'Launched' : 'Failed';
                        setTimeout(function() { launchBtn.textContent = 'Open in Ghostty'; launchBtn.disabled = false; }, 2000);
                    })
                    .catch(function() {
                        launchBtn.textContent = 'Failed';
                        setTimeout(function() { launchBtn.textContent = 'Open in Ghostty'; launchBtn.disabled = false; }, 2000);
                    });
            });
            // Superset button (only if workspace ID available)
            if (peer.supersetWorkspaceId) {
                var supersetBtn = el('button', 'sd-launch-btn sd-superset-btn', 'Open in Superset');
                supersetBtn.addEventListener('click', function() {
                    window.open('superset://workspace/' + peer.supersetWorkspaceId);
                });
                var btnRow = el('div', 'sd-btn-row');
                btnRow.appendChild(launchBtn);
                btnRow.appendChild(supersetBtn);
                detail.appendChild(btnRow);
            } else {
                detail.appendChild(launchBtn);
            }

            // Recap section - prefer agent's set_summary, fall back to last assistant message
            var recapText = peer.summary || peer.recap || null;
            if (recapText) {
                var recapSection = el('div', 'sd-section');
                recapSection.appendChild(el('div', 'sd-section-title', 'Recap'));
                recapSection.appendChild(el('div', 'sd-recap', recapText));
                detail.appendChild(recapSection);
            }

            // User messages
            if (peer.userMessages && peer.userMessages.length > 0) {
                var msgSection = el('div', 'sd-section');
                msgSection.appendChild(el('div', 'sd-section-title', 'Your Messages'));
                var msgList = el('div', 'sd-messages');
                for (var m = peer.userMessages.length - 1; m >= 0; m--) {
                    var msg = peer.userMessages[m];
                    var msgEl = el('div', 'sd-message');
                    var msgText = el('div', 'sd-message-text', msg.text);
                    msgEl.appendChild(msgText);
                    if (msg.timestamp) {
                        msgEl.appendChild(el('div', 'sd-message-time', formatTimeSince(msg.timestamp)));
                    }
                    msgList.appendChild(msgEl);
                }
                msgSection.appendChild(msgList);
                detail.appendChild(msgSection);
            }

            panel.appendChild(detail);
        }

        // ---- RENDER ROOMS ----
        function renderRooms(peers) {
            var grid = document.getElementById('roomsGrid');
            grid.textContent = '';

            // Group by project
            var projects = {};
            for (var i = 0; i < peers.length; i++) {
                var key = extractProject(peers[i].cwd);
                if (!projects[key]) projects[key] = [];
                projects[key].push(peers[i]);
            }

            // Sort by most recently active: active agents first, then by latest lastInstructionAt
            function roomSortKey(agents) {
                var hasActive = false;
                var latest = 0;
                for (var i = 0; i < agents.length; i++) {
                    if (isActive(agents[i])) hasActive = true;
                    var ts = agents[i].lastInstructionAt || agents[i].lastActiveAt;
                    if (ts) {
                        var t = new Date(ts).getTime();
                        if (t > latest) latest = t;
                    }
                }
                return (hasActive ? 1e15 : 0) + latest;
            }
            var keys = Object.keys(projects).sort(function(a, b) {
                return roomSortKey(projects[b]) - roomSortKey(projects[a]);
            });

            for (var k = 0; k < keys.length; k++) {
                grid.appendChild(buildRoom(keys[k], projects[keys[k]]));
            }

            // Re-render any active walking overlays
            renderWalkingOverlays();
        }

        // ---- SYNC ----
        var lastPeers = null;

        function syncPeers(peers) {
            if (!peers) return;

            // Detect state transitions and trigger walking animations
            for (var i = 0; i < peers.length; i++) {
                var p = peers[i];
                var wasActive = prevActiveState[p.id];
                var nowActive = isActive(p);

                if (wasActive !== undefined && wasActive !== nowActive && !walkingAgents[p.id]) {
                    startWalkAnimation(p.id, p, nowActive ? 'to-office' : 'to-bed');
                }
                prevActiveState[p.id] = nowActive;
            }

            lastPeers = peers;

            // Update peer map
            allPeersMap = {};
            var activeCount = 0, idleCount = 0;
            var projectSet = {};
            for (var j = 0; j < peers.length; j++) {
                allPeersMap[peers[j].id] = peers[j];
                if (isActive(peers[j])) activeCount++; else idleCount++;
                projectSet[extractProject(peers[j].cwd)] = true;
            }

            document.getElementById('heroCount').textContent = peers.length;
            document.getElementById('heroActive').textContent = activeCount;
            document.getElementById('heroIdle').textContent = idleCount;
            document.getElementById('heroProjects').textContent = Object.keys(projectSet).length;
            document.getElementById('statusText').textContent = 'Live - ' + activeCount + ' working, ' + idleCount + ' sleeping - ' + new Date().toLocaleTimeString();

            renderRooms(peers);

            if (selectedId && allPeersMap[selectedId]) {
                renderDetail(allPeersMap[selectedId]);
            }
        }

        // ---- FETCH ----
        function fetchPeers() {
            return fetch('/api/peers')
                .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(function(d) { if (d.error) throw new Error(d.error); return d; })
                .catch(function() { return null; });
        }

        fetchPeers().then(syncPeers);
        setInterval(function() { fetchPeers().then(syncPeers); }, POLL_INTERVAL);
    })();
    </script>
</body>
</html>
