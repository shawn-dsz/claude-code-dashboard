<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Agents — Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0e1a;
            --bg-card: #141825;
            --bg-card-hover: #1a2035;
            --border: #1e2740;
            --border-bright: #2a3555;
            --text: #e8eaf0;
            --text-dim: #6b7394;
            --text-muted: #3d4563;
            --green: #00d68f;
            --green-dim: #00d68f33;
            --purple: #7b61ff;
            --purple-dim: #7b61ff22;
            --blue: #4da6ff;
            --orange: #ffaa33;
            --red: #ff5555;
            --pink: #ff79c6;
            --pixel-font: 'Press Start 2P', monospace;
            --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            --ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        body {
            font-family: var(--ui);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ---- TOP BAR ---- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .logo { font-family: var(--pixel-font); font-size: 10px; color: var(--green); letter-spacing: 1px; }
        .topbar-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
        .live-dot {
            width: 6px; height: 6px; background: var(--green); border-radius: 50%;
            box-shadow: 0 0 6px var(--green); animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .nav-btn {
            font-size: 11px; color: var(--text-dim); text-decoration: none;
            padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; transition: all .15s;
        }
        .nav-btn:hover { color: var(--text); border-color: var(--border-bright); background: var(--bg-card-hover); }

        /* ---- HERO ---- */
        .hero { display: flex; align-items: center; justify-content: center; gap: 48px; padding: 28px 24px 20px; }
        .hero-metric { text-align: center; }
        .hero-number {
            font-family: var(--pixel-font); font-size: 72px; color: var(--green);
            line-height: 1; text-shadow: 0 0 30px var(--green-dim), 0 0 60px var(--green-dim);
        }
        .hero-label { font-family: var(--pixel-font); font-size: 8px; color: var(--text-dim); margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }
        .hero-stats { display: flex; gap: 32px; }
        .hero-stat { text-align: center; }
        .hero-stat-val { font-family: var(--pixel-font); font-size: 20px; color: var(--purple); text-shadow: 0 0 15px var(--purple-dim); }
        .hero-stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        /* ---- ROOMS GRID ---- */
        .rooms-container { padding: 0 24px 24px; }
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        /* ---- ROOM ---- */
        .room {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .room-header {
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            font-family: var(--pixel-font);
            font-size: 8px;
            color: var(--text);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-count { color: var(--text-dim); font-family: var(--ui); font-size: 10px; }
        .room-body {
            display: flex;
            min-height: 120px;
        }

        /* Office side */
        .room-office {
            flex: 1;
            padding: 10px;
            border-right: 1px dashed var(--border);
            position: relative;
        }
        .room-office-label {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-family: var(--pixel-font);
        }

        /* Bedroom side */
        .room-bedroom {
            flex: 1;
            padding: 10px;
            position: relative;
        }
        .room-bedroom-label {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-family: var(--pixel-font);
        }

        /* ---- DESK (office) ---- */
        .desk-slot {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            height: 32px;
            cursor: pointer;
            border-radius: 4px;
            padding: 2px 4px;
            transition: background .1s;
        }
        .desk-slot:hover { background: var(--bg-card-hover); }
        .desk-slot.selected { background: #7b61ff18; }

        .desk-sprite { width: 24px; height: 24px; flex-shrink: 0; image-rendering: pixelated; }
        .desk-monitor {
            width: 36px; height: 24px;
            background: #0a0e1a;
            border: 2px solid var(--border-bright);
            border-radius: 2px;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }
        .desk-monitor-screen {
            position: absolute;
            inset: 2px;
            background: #0d1117;
            overflow: hidden;
        }
        .desk-monitor-line {
            height: 2px;
            margin: 1px 2px;
            border-radius: 1px;
            background: var(--green);
            opacity: 0.6;
        }
        .desk-monitor-stand {
            width: 8px; height: 3px;
            background: var(--border-bright);
            margin: 0 auto;
        }
        .desk-id {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text-dim);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Typing animation on monitor */
        @keyframes typing {
            0% { width: 0; }
            50% { width: 80%; }
            100% { width: 0; }
        }
        .desk-slot.working .desk-monitor-line {
            animation: typing 1.5s steps(6) infinite;
        }
        .desk-slot.working .desk-monitor-line:nth-child(2) { animation-delay: 0.3s; }
        .desk-slot.working .desk-monitor-line:nth-child(3) { animation-delay: 0.6s; }

        /* ---- BED (bedroom) ---- */
        .bed-slot {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            height: 32px;
            cursor: pointer;
            border-radius: 4px;
            padding: 2px 4px;
            transition: background .1s;
        }
        .bed-slot:hover { background: var(--bg-card-hover); }
        .bed-slot.selected { background: #7b61ff18; }

        .bed-sprite { width: 24px; height: 24px; flex-shrink: 0; image-rendering: pixelated; }
        .bed-frame {
            width: 40px; height: 20px;
            background: #1a1f30;
            border: 1px solid var(--border);
            border-radius: 3px;
            position: relative;
            flex-shrink: 0;
        }
        .bed-pillow {
            position: absolute;
            left: 2px; top: 3px;
            width: 10px; height: 14px;
            background: #2a3050;
            border-radius: 2px;
        }
        .bed-blanket {
            position: absolute;
            right: 2px; top: 4px;
            width: 24px; height: 12px;
            border-radius: 2px;
            opacity: 0.6;
        }
        .bed-zzz {
            font-family: var(--pixel-font);
            font-size: 6px;
            color: var(--text-muted);
            animation: zzz 2s ease-in-out infinite;
        }
        @keyframes zzz {
            0%,100% { opacity: .3; transform: translateY(0); }
            50% { opacity: .8; transform: translateY(-3px); }
        }
        .bed-id {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text-muted);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ---- DETAIL PANELS ---- */
        .detail-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 16px; margin: 0 24px 24px;
        }
        .detail-panel {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
        }
        .detail-panel-header {
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .detail-panel-body { padding: 0; max-height: 300px; overflow-y: auto; }
        .detail-panel-body::-webkit-scrollbar { width: 4px; }
        .detail-panel-body::-webkit-scrollbar-track { background: transparent; }
        .detail-panel-body::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

        .agent-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background .1s;
        }
        .agent-item:last-child { border-bottom: none; }
        .agent-item:hover { background: var(--bg-card-hover); }
        .agent-item.selected { background: #7b61ff11; border-left: 2px solid var(--purple); }
        .agent-color-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
        .agent-info { flex: 1; min-width: 0; }
        .agent-info-top { display: flex; align-items: center; gap: 8px; }
        .agent-id-label { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); }
        .agent-status-tag { font-size: 8px; padding: 1px 5px; border-radius: 3px; }
        .agent-status-tag.active { color: var(--green); background: #00d68f15; }
        .agent-status-tag.idle { color: var(--text-muted); background: #3d456315; }
        .agent-branch-tag { font-family: var(--mono); font-size: 9px; color: var(--blue); background: #4da6ff11; padding: 1px 6px; border-radius: 3px; }
        .agent-info-bottom { font-size: 10px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .agent-uptime-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

        .selected-detail { padding: 16px; }
        .selected-detail-empty { padding: 40px 16px; text-align: center; color: var(--text-muted); font-size: 11px; }
        .sd-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
        .sd-row:last-child { border-bottom: none; }
        .sd-key { color: var(--text-dim); }
        .sd-val { color: var(--text); font-family: var(--mono); text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sd-summary { margin-top: 12px; padding: 10px; background: #0a0e1a; border-radius: 4px; font-size: 11px; color: var(--text-dim); font-style: italic; word-break: break-word; }

        @media (max-width: 768px) {
            .hero { flex-direction: column; gap: 20px; }
            .hero-number { font-size: 48px; }
            .detail-grid { grid-template-columns: 1fr; }
            .rooms-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <span class="logo">CLAUDE AGENTS</span>
            <div class="topbar-status">
                <span class="live-dot"></span>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
        <div class="topbar-right">
            <a href="/index.html" class="nav-btn">Activity Dashboard</a>
        </div>
    </div>

    <div class="hero">
        <div class="hero-metric">
            <div class="hero-number" id="heroCount">0</div>
            <div class="hero-label">Agents Online</div>
        </div>
        <div class="hero-stats">
            <div class="hero-stat">
                <div class="hero-stat-val" id="heroActive">0</div>
                <div class="hero-stat-label">Working</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-val" id="heroIdle">0</div>
                <div class="hero-stat-label">Sleeping</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-val" id="heroProjects">0</div>
                <div class="hero-stat-label">Projects</div>
            </div>
        </div>
    </div>

    <div class="rooms-container">
        <div class="rooms-grid" id="roomsGrid"></div>
    </div>

    <div class="detail-grid">
        <div class="detail-panel">
            <div class="detail-panel-header">
                <span>All Agents</span>
                <span id="listCount"></span>
            </div>
            <div class="detail-panel-body" id="agentListPanel"></div>
        </div>
        <div class="detail-panel">
            <div class="detail-panel-header"><span>Agent Detail</span></div>
            <div class="detail-panel-body" id="agentDetailPanel">
                <div class="selected-detail-empty">Click an agent to inspect</div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        var POLL_INTERVAL = 5000;
        var selectedId = null;

        var PALETTE = [
            ['#ff5555','#cc3333'], ['#00d68f','#009966'], ['#7b61ff','#5533cc'],
            ['#4da6ff','#3377cc'], ['#ffaa33','#cc8800'], ['#ff79c6','#cc5599'],
            ['#50fa7b','#33cc55'], ['#f1fa8c','#cccc44'], ['#8be9fd','#55bbcc'],
            ['#bd93f9','#9966dd'],
        ];

        function hashId(id) {
            var h = 0;
            for (var i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
            return Math.abs(h);
        }
        function getColors(id) { return PALETTE[hashId(id) % PALETTE.length]; }
        // Activity is determined server-side via CPU usage (> 1%)
        function isActive(peer) { return !!peer.isActive; }
        function extractProject(cwd) {
            var m = cwd.match(/\/proj\/(.+)$/);
            return m ? m[1] : cwd.split('/').slice(-2).join('/');
        }
        function shortProject(cwd) { return extractProject(cwd).split('/').pop(); }
        function isWorktree(cwd) { return cwd.indexOf('/worktrees/') !== -1; }
        function extractBranch(cwd) { return isWorktree(cwd) ? cwd.split('/').pop() : 'main'; }
        function formatUptime(ts) {
            var ms = Date.now() - new Date(ts).getTime();
            var m = Math.floor(ms / 60000);
            if (m < 60) return m + 'm';
            var h = Math.floor(m / 60);
            if (h < 24) return h + 'h ' + (m % 60) + 'm';
            return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
        }
        function el(tag, cls, txt) {
            var n = document.createElement(tag);
            if (cls) n.className = cls;
            if (txt) n.textContent = txt;
            return n;
        }

        // Draw small sprite head for desk/bed
        function drawHead(canvas, color) {
            var ctx = canvas.getContext('2d');
            var s = 3;
            ctx.clearRect(0, 0, 24, 24);
            ctx.imageSmoothingEnabled = false;
            // Head
            ctx.fillStyle = '#ffd5b0';
            ctx.fillRect(3*s, 0, 2*s, 2*s);
            // Eyes
            ctx.fillStyle = '#222';
            ctx.fillRect(3*s, s*0.8, s*0.5, s*0.4);
            ctx.fillRect(4.3*s, s*0.8, s*0.5, s*0.4);
            // Body
            ctx.fillStyle = color;
            ctx.fillRect(2*s, 2*s, 4*s, 3*s);
            // Arms
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.7;
            ctx.fillRect(1*s, 2.5*s, s, 2*s);
            ctx.fillRect(6*s, 2.5*s, s, 2*s);
            ctx.globalAlpha = 1;
        }

        function drawSleepingHead(canvas, color) {
            var ctx = canvas.getContext('2d');
            var s = 3;
            ctx.clearRect(0, 0, 24, 24);
            ctx.imageSmoothingEnabled = false;
            // Head
            ctx.fillStyle = '#ffd5b0';
            ctx.fillRect(3*s, 0, 2*s, 2*s);
            // Closed eyes (lines)
            ctx.fillStyle = '#888';
            ctx.fillRect(3*s, s*0.9, s*0.6, s*0.15);
            ctx.fillRect(4.2*s, s*0.9, s*0.6, s*0.15);
            // Body
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.5;
            ctx.fillRect(2*s, 2*s, 4*s, 3*s);
            ctx.globalAlpha = 1;
        }

        // ---- BUILD ROOM ----
        function buildRoom(projectKey, agents) {
            var room = el('div', 'room');
            room.id = 'room-' + projectKey.replace(/\//g, '-');

            var activeAgents = [];
            var idleAgents = [];
            for (var i = 0; i < agents.length; i++) {
                if (isActive(agents[i])) activeAgents.push(agents[i]);
                else idleAgents.push(agents[i]);
            }

            // Header
            var header = el('div', 'room-header');
            header.appendChild(el('span', '', shortProject(agents[0].cwd)));
            header.appendChild(el('span', 'room-count', agents.length + ' agent' + (agents.length !== 1 ? 's' : '')));
            room.appendChild(header);

            // Body: office + bedroom
            var body = el('div', 'room-body');

            // Office side
            var office = el('div', 'room-office');
            office.appendChild(el('div', 'room-office-label', 'office'));
            for (var a = 0; a < activeAgents.length; a++) {
                office.appendChild(buildDeskSlot(activeAgents[a]));
            }
            if (activeAgents.length === 0) {
                var emptyOffice = el('div', '', 'empty');
                emptyOffice.style.cssText = 'font-size:9px;color:var(--text-muted);padding:8px 0;';
                office.appendChild(emptyOffice);
            }
            body.appendChild(office);

            // Bedroom side
            var bedroom = el('div', 'room-bedroom');
            bedroom.appendChild(el('div', 'room-bedroom-label', 'bedroom'));
            for (var b = 0; b < idleAgents.length; b++) {
                bedroom.appendChild(buildBedSlot(idleAgents[b]));
            }
            if (idleAgents.length === 0) {
                var emptyBed = el('div', '', 'empty');
                emptyBed.style.cssText = 'font-size:9px;color:var(--text-muted);padding:8px 0;';
                bedroom.appendChild(emptyBed);
            }
            body.appendChild(bedroom);

            room.appendChild(body);
            return room;
        }

        // ---- DESK SLOT ----
        function buildDeskSlot(peer) {
            var colors = getColors(peer.id);
            var slot = el('div', 'desk-slot working');
            if (peer.id === selectedId) slot.classList.add('selected');

            slot.addEventListener('click', function() { selectAgent(peer.id, peer); });

            // Sprite
            var canvas = document.createElement('canvas');
            canvas.width = 24; canvas.height = 24;
            canvas.className = 'desk-sprite';
            drawHead(canvas, colors[0]);
            slot.appendChild(canvas);

            // Monitor
            var monitor = el('div', 'desk-monitor');
            var screen = el('div', 'desk-monitor-screen');
            screen.appendChild(el('div', 'desk-monitor-line'));
            screen.appendChild(el('div', 'desk-monitor-line'));
            screen.appendChild(el('div', 'desk-monitor-line'));
            monitor.appendChild(screen);
            slot.appendChild(monitor);
            slot.appendChild(el('div', '', ''));  // stand space
            var stand = el('div', 'desk-monitor-stand');
            // append stand after monitor visually... actually it's fine inline

            // ID label
            slot.appendChild(el('span', 'desk-id', peer.id));

            return slot;
        }

        // ---- BED SLOT ----
        function buildBedSlot(peer) {
            var colors = getColors(peer.id);
            var slot = el('div', 'bed-slot');
            if (peer.id === selectedId) slot.classList.add('selected');

            slot.addEventListener('click', function() { selectAgent(peer.id, peer); });

            // Sleeping sprite
            var canvas = document.createElement('canvas');
            canvas.width = 24; canvas.height = 24;
            canvas.className = 'bed-sprite';
            drawSleepingHead(canvas, colors[0]);
            slot.appendChild(canvas);

            // Bed
            var bed = el('div', 'bed-frame');
            bed.appendChild(el('div', 'bed-pillow'));
            var blanket = el('div', 'bed-blanket');
            blanket.style.background = colors[0];
            bed.appendChild(blanket);
            slot.appendChild(bed);

            // zzz
            slot.appendChild(el('span', 'bed-zzz', 'zzz'));

            // ID
            slot.appendChild(el('span', 'bed-id', peer.id));

            return slot;
        }

        // ---- SELECTION ----
        var allPeersMap = {};

        function selectAgent(id, peer) {
            selectedId = id;
            if (!peer && allPeersMap[id]) peer = allPeersMap[id];

            // Highlight in rooms
            var allSlots = document.querySelectorAll('.desk-slot, .bed-slot');
            for (var i = 0; i < allSlots.length; i++) allSlots[i].classList.remove('selected');
            // Highlight in list
            var allItems = document.querySelectorAll('.agent-item');
            for (var j = 0; j < allItems.length; j++) allItems[j].classList.remove('selected');

            // Find and highlight the matching slot and list item
            // (they get rebuilt on each sync, so we rely on re-render adding .selected)

            renderDetail(peer);
            // Force re-render to apply selection
            if (lastPeers) renderRooms(lastPeers);
            if (lastPeers) renderList(lastPeers);
        }

        // ---- RENDER DETAIL ----
        function renderDetail(peer) {
            var panel = document.getElementById('agentDetailPanel');
            panel.textContent = '';
            if (!peer) {
                panel.appendChild(el('div', 'selected-detail-empty', 'Click an agent to inspect'));
                return;
            }
            var active = isActive(peer);
            var detail = el('div', 'selected-detail');
            var rows = [
                ['ID', peer.id], ['Status', active ? 'Working' : 'Sleeping'],
                ['Project', extractProject(peer.cwd)], ['Branch', extractBranch(peer.cwd)],
                ['TTY', peer.tty || '-'], ['Uptime', formatUptime(peer.registered_at)],
                ['Worktree', isWorktree(peer.cwd) ? 'Yes' : 'No'],
                ['Working Dir', peer.cwd], ['Last Seen', new Date(peer.last_seen).toLocaleTimeString()],
            ];
            for (var i = 0; i < rows.length; i++) {
                var row = el('div', 'sd-row');
                row.appendChild(el('span', 'sd-key', rows[i][0]));
                var val = el('span', 'sd-val', rows[i][1]);
                val.title = rows[i][1];
                if (rows[i][0] === 'Status') val.style.color = active ? 'var(--green)' : 'var(--text-muted)';
                row.appendChild(val);
                detail.appendChild(row);
            }
            detail.appendChild(el('div', 'sd-summary', peer.summary || 'No summary set'));
            panel.appendChild(detail);
        }

        // ---- RENDER ROOMS ----
        function renderRooms(peers) {
            var grid = document.getElementById('roomsGrid');
            grid.textContent = '';

            // Group by project
            var projects = {};
            for (var i = 0; i < peers.length; i++) {
                var key = extractProject(peers[i].cwd);
                if (!projects[key]) projects[key] = [];
                projects[key].push(peers[i]);
            }

            // Sort by agent count desc
            var keys = Object.keys(projects).sort(function(a, b) {
                return projects[b].length - projects[a].length;
            });

            for (var k = 0; k < keys.length; k++) {
                grid.appendChild(buildRoom(keys[k], projects[keys[k]]));
            }
        }

        // ---- RENDER LIST ----
        function renderList(peers) {
            var panel = document.getElementById('agentListPanel');
            panel.textContent = '';
            var sorted = peers.slice().sort(function(a, b) {
                return extractProject(a.cwd).localeCompare(extractProject(b.cwd));
            });
            for (var i = 0; i < sorted.length; i++) {
                var peer = sorted[i];
                var colors = getColors(peer.id);
                var active = isActive(peer);
                var item = el('div', 'agent-item' + (peer.id === selectedId ? ' selected' : ''));

                (function(p) { item.addEventListener('click', function() { selectAgent(p.id, p); }); })(peer);

                var dot = el('div', 'agent-color-dot');
                dot.style.background = active ? colors[0] : 'var(--text-muted)';
                item.appendChild(dot);

                var info = el('div', 'agent-info');
                var top = el('div', 'agent-info-top');
                top.appendChild(el('span', 'agent-id-label', peer.id));
                top.appendChild(el('span', 'agent-status-tag ' + (active ? 'active' : 'idle'), active ? 'working' : 'sleeping'));
                top.appendChild(el('span', 'agent-branch-tag', extractBranch(peer.cwd)));
                info.appendChild(top);
                info.appendChild(el('div', 'agent-info-bottom', extractProject(peer.cwd)));
                item.appendChild(info);
                item.appendChild(el('span', 'agent-uptime-label', formatUptime(peer.registered_at)));
                panel.appendChild(item);
            }
        }

        // ---- SYNC ----
        var lastPeers = null;

        function syncPeers(peers) {
            if (!peers) return;
            lastPeers = peers;

            // Update peer map
            allPeersMap = {};
            var activeCount = 0, idleCount = 0;
            var projectSet = {};
            for (var i = 0; i < peers.length; i++) {
                allPeersMap[peers[i].id] = peers[i];
                if (isActive(peers[i])) activeCount++; else idleCount++;
                projectSet[extractProject(peers[i].cwd)] = true;
            }

            document.getElementById('heroCount').textContent = peers.length;
            document.getElementById('heroActive').textContent = activeCount;
            document.getElementById('heroIdle').textContent = idleCount;
            document.getElementById('heroProjects').textContent = Object.keys(projectSet).length;
            document.getElementById('statusText').textContent = 'Live - ' + activeCount + ' working, ' + idleCount + ' sleeping - ' + new Date().toLocaleTimeString();
            document.getElementById('listCount').textContent = activeCount + ' working, ' + idleCount + ' sleeping';

            renderRooms(peers);
            renderList(peers);

            if (selectedId && allPeersMap[selectedId]) {
                renderDetail(allPeersMap[selectedId]);
            }
        }

        // ---- FETCH ----
        function fetchPeers() {
            return fetch('/api/peers')
                .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(function(d) { if (d.error) throw new Error(d.error); return d; })
                .catch(function() { return null; });
        }

        fetchPeers().then(syncPeers);
        setInterval(function() { fetchPeers().then(syncPeers); }, POLL_INTERVAL);
    })();
    </script>
</body>
</html>
